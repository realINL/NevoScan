services:
  minio:
    image: minio/minio:latest  
    container_name: nevoscan-minio
    restart: unless-stopped
    volumes:
      - minio-storage:/data
      - minio-config:/root/.minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:  #
      - "9000:9000"   # API порт
      - "9001:9001"   # Web консоль
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - app-network
  
  redis:
    image: redis:latest
    container_name: nevoscan-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_USER=${REDIS_USER}
      - REDIS_USER_PASSWORD=${REDIS_USER_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: >
      sh -c '
        mkdir -p /usr/local/etc/redis &&
        echo "bind 0.0.0.0" > /usr/local/etc/redis/redis.conf &&
        echo "requirepass $REDIS_PASSWORD" >> /usr/local/etc/redis/redis.conf &&
        echo "appendonly yes" >> /usr/local/etc/redis/redis.conf &&
        echo "appendfsync everysec" >> /usr/local/etc/redis/redis.conf &&
        echo "user default on nopass ~* +@all" > /usr/local/etc/redis/users.acl &&
        echo "user $REDIS_USER on >$REDIS_USER_PASSWORD ~* +@all" >> /usr/local/etc/redis/users.acl &&
        redis-server /usr/local/etc/redis/redis.conf --aclfile /usr/local/etc/redis/users.acl
      '
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true
    networks:
        - app-network

  gateway:
    build:
      context: .
      dockerfile: Gateway/Dockerfile
    container_name: gateway
    restart: unless-stopped
    ports: 
      - 8000:80
    env_file:
      - ./env.test
      - path: ./Gateway/.env
        required: false
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # - MINIO_URL=minio:9000
      - ML_API_URL=http://mlservice:80 
    depends_on:
      - redis
      - minio
      - mlservice
    networks:
      - app-network
  
  mlservice:
    build:
      context: .
      dockerfile: MLService/Dockerfile
    container_name: mlservice
    restart: unless-stopped
    ports: 
      - 8001:80
    volumes:
      - /opt/models:/models
    env_file:
      - ./env.test
      - path: ./MLService/.env
        required: false
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # - MINIO_URL=minio:9000
      - FASTAPI_URL=http://gateway:80
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network

  caddy:
    build: ./nevoscanweb
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/caddy/Caddyfile:/etc/caddy/Caddyfile:ro   
      - /opt/caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
    networks:
      - app-network
    depends_on:
      - gateway

networks:
  app-network:
    driver: bridge


volumes:
  minio-storage:
  minio-config:
  redisdata:
  frontend-build:
  caddy_data: